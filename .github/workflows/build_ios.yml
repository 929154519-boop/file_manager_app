name: Build iOS IPA (Unsigned)
on:
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Initialize iOS project
        run: flutter create . --platforms=ios --no-overwrite

      - name: Install dependencies
        run: flutter pub get

      - name: Force disable Xcode code signing
        run: |
          echo "CODE_SIGNING_ALLOWED = NO;" >> ios/Runner.xcodeproj/project.pbxproj
          echo "CODE_SIGNING_REQUIRED = NO;" >> ios/Runner.xcodeproj/project.pbxproj

      - name: Build unsigned IPA
        run: |
          flutter build ios --release --no-codesign --no-tree-shake-icons
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r unsigned_file_manager.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: build/ios/iphoneos/unsigned_file_manager.ipa
