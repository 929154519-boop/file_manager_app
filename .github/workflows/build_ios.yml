name: Build iOS IPA (Unsigned)
on:
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # 先删除旧的 ios 目录，重新生成干净的 iOS 项目（避免之前的损坏）
      - name: Clean and reinitialize iOS project
        run: |
          rm -rf ios
          flutter create . --platforms=ios

      - name: Install dependencies
        run: flutter pub get

      # 用构建参数绕过签名，不再手动修改项目文件
      - name: Build unsigned IPA
        run: |
          flutter build ios --release --no-codesign --no-tree-shake-icons --dart-define=FLUTTER_IOS_SKIP_CODE_SIGNING=1
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r unsigned_file_manager.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: build/ios/iphoneos/unsigned_file_manager.ipa
